name: Checks

on:
  push:
    branches: [master]
  pull_request:
    branches: ["**"]
  workflow_call:

concurrency:
  # Skip concurrency restriction when called from another workflow
  # This prevents deadlocks between parent workflow and this one
  group:
    ${{ github.event_name == 'workflow_call' && format('{0}-{1}', github.workflow,
    github.run_id) || format('{0}-{1}', github.workflow, github.ref) }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        command: [check-types, check-format, lint, test]
    name: ${{ matrix.command }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ${{ matrix.command }}
        run: pnpm ${{ matrix.command }}
